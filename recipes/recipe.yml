# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: my-bazzite
description: My custom Bazzite KDE image

base-image: ghcr.io/ublue-os/bazzite-nvidia
image-version: latest

modules:
  - type: files
    files:
      - source: system
        destination: / 

  - type: rpm-ostree
    # Cloudflare repository for WARP
    repos:
      - https://pkg.cloudflareclient.com/cloudflare-warp-ascii.repo
    install:
      - alacritty
      - kvantum
      - cloudflare-warp
    remove:
      # Ripping out the core launchers and bloatware
      - steam
      - lutris
      - sunshine
      - waydroid

  - type: default-flatpaks
    configurations:
      - scope: system
        install:
          # Just your core productivity and utility apps
          - org.qbittorrent.qBittorrent
          - org.onlyoffice.desktopeditors

  - type: signing
